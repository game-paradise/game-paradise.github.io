<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Game Paradise - Escape Road 2</title>
   <link rel="icon" type="image/png" href="icon/favicon.png">
  <link rel="apple-touch-icon" href="icon/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
      });
    }
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      background: white;
      display: block;
    }

    /* 3. De subtiele Home-knop */
    .pwa-back-button {
      position: fixed;
      top: env(safe-area-inset-top, 10px); 
      left: env(safe-area-inset-left, 10px);
      background: rgba(0, 0, 0, 0.2); /* Iets donkerder omdat embeds vaak licht zijn */
      color: rgba(0, 0, 0, 0.7);
      padding: 6px 12px;
      border-radius: 8px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      z-index: 999999;
      cursor: pointer;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
    }

    /* Blauw bij klikken */
    .pwa-back-button:active {
      background: rgba(37, 99, 235, 0.5);
      color: white;
    }
    }
  </style>
</head>
<body>

  <a href="/index.html" class="pwa-back-button">
    <span>←</span> 
    <span>Home</span>
  </a>

  <iframe
    src="https://azgames.io/escape-road-2.embed"
    allowfullscreen
    loading="eager">
  </iframe>

</body>
</html>
