
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Blast Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background: linear-gradient(to bottom, #5d7ebe, #3b5998);
      touch-action: none;
    }
    
    @keyframes block-shatter {
      0% { 
        transform: scale(1); 
        filter: brightness(1) drop-shadow(0 0 0px white); 
        opacity: 1; 
      }
      30% { 
        transform: scale(1.3); 
        filter: brightness(3) drop-shadow(0 0 15px white); 
        opacity: 1; 
      }
      100% { 
        transform: scale(0); 
        filter: brightness(5) drop-shadow(0 0 30px white); 
        opacity: 0; 
      }
    }

    @keyframes score-float {
      0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
      20% { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
      80% { transform: translate(-50%, -50px) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -70px) scale(0.8); opacity: 0; }
    }

    @keyframes unbelievable-pop {
      0% { transform: scale(0.5) rotate(-10deg); opacity: 0; filter: blur(10px); }
      50% { transform: scale(1.2) rotate(5deg); opacity: 1; filter: blur(0px); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes rainbow-text {
      0% { color: #ff0000; }
      20% { color: #ff00ff; }
      40% { color: #0000ff; }
      60% { color: #00ffff; }
      80% { color: #00ff00; }
      100% { color: #ffff00; }
    }

    @keyframes screen-shake {
      0%, 100% { transform: translate(0, 0); }
      10%, 30%, 50%, 70%, 90% { transform: translate(-4px, -4px); }
      20%, 40%, 60%, 80% { transform: translate(4px, 4px); }
    }

    @keyframes block-die {
      0% { 
        transform: translateY(0) rotate(0); 
        filter: grayscale(0) brightness(1); 
        opacity: 1; 
      }
      20% {
        transform: translateY(-15px) rotate(-5deg);
        filter: grayscale(0.5) brightness(0.7);
        opacity: 1;
      }
      100% { 
        transform: translateY(800px) rotate(45deg); 
        filter: grayscale(1) brightness(0.2); 
        opacity: 0; 
      }
    }

    .animate-clear {
      animation: block-shatter 0.45s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      z-index: 50;
    }

    .animate-die {
      animation: block-die 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
      z-index: 40;
    }

    .floating-score {
      position: absolute;
      pointer-events: none;
      z-index: 100;
      color: #fff;
      -webkit-text-stroke: 2px #f59e0b;
      font-weight: 900;
      font-size: 2rem;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
      animation: score-float 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    .unbelievable-text {
      animation: unbelievable-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                 rainbow-text 1s linear infinite;
      text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 10px 20px rgba(0,0,0,0.5);
    }

    .screen-shake {
      animation: screen-shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
</head>
<body class="text-white">
  <div id="root"></div>
</body>
</html>
