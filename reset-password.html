<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Game Paradise - Wachtwoord Reset</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/icon/favicon.png">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --bg: #020617;
      --card-bg: #0f172a;
      --primary: #2563eb;
      --accent: #60a5fa;
      --success: #22c55e;
      --danger: #ef4444;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(circle at top right, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .modal-box {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      text-align: center;
      border: 1px solid #1e293b;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    h2 {
      color: var(--accent);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      background: var(--primary);
      color: white;
      transition: transform 0.1s ease, background 0.2s ease;
    }

    button:hover {
      transform: scale(1.02);
      background: #1d4ed8;
    }

    .home-btn {
      display: none;
      background: var(--success);
      margin-top: 15px;
      text-decoration: none;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      display: block;
      transition: transform 0.1s ease, background 0.2s ease;
    }

    .home-btn:hover {
      transform: scale(1.02);
      background: #16a34a;
    }

    .msg {
      margin-top: 15px;
      color: var(--text-dim);
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="modal-box">
    <h2>Nieuw Wachtwoord</h2>
    <input id="pass1" type="password" placeholder="Nieuw wachtwoord">
    <input id="pass2" type="password" placeholder="Herhaal wachtwoord">
    <button id="resetBtn">Wachtwoord opslaan</button>

    <a id="homeBtn" class="home-btn" href="/">Terug naar Homepage</a>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0K4geAuueVfiItB_98-LkqRTnpYNUNvM",
      authDomain: "gameparadise-80490.firebaseapp.com",
      projectId: "gameparadise-80490",
      storageBucket: "gameparadise-80490.firebasestorage.app",
      messagingSenderId: "335620903527",
      appId: "1:335620903527:web:1bc1e01a386bf6e4e7fac2"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const msg = document.getElementById("msg");
    const btn = document.getElementById("resetBtn");
    const homeBtn = document.getElementById("homeBtn");

    // Haal oobCode uit URL
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get("oobCode");

    if (!oobCode) {
      msg.textContent = "❌ Ongeldige of verlopen reset-link.";
      msg.style.color = "#ef4444";
      btn.disabled = true;
    }

    btn.onclick = () => {
      const p1 = document.getElementById("pass1").value;
      const p2 = document.getElementById("pass2").value;

      if (!p1 || !p2) {
        msg.textContent = "⚠️ Vul beide velden in.";
        return;
      }

      if (p1 !== p2) {
        msg.textContent = "❌ Wachtwoorden komen niet overeen.";
        return;
      }

      if (p1.length < 6) {
        msg.textContent = "⚠️ Wachtwoord moet minstens 6 tekens zijn.";
        return;
      }

      auth.confirmPasswordReset(oobCode, p1)
        .then(() => {
          msg.style.color = "#22c55e";
          msg.textContent = "✅ Wachtwoord succesvol gewijzigd! Je kunt nu inloggen.";
          btn.disabled = true;
          homeBtn.style.display = "block";
        })
        .catch(err => {
          msg.style.color = "#ef4444";
          msg.textContent = "❌ Fout: " + err.message;
        });
    };
  </script>

</body>
</html>
