<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Game Paradise - Drive Mad</title>
    
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="apple-touch-icon" href="icon/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="stylesheet" href="webapp/fancade.css" />

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW geregistreerd!'))
            .catch(err => console.error('SW mislukt:', err));
        });
      }
    </script>

    <style>
        /* De subtiele PWA Home-knop */
        .pwa-back-button {
            position: fixed;
            /* Echt strak in de hoek, rekening houdend met notches op telefoons */
            top: env(safe-area-inset-top, 10px); 
            left: env(safe-area-inset-left, 10px);
            
            /* Design: Klein en doorzichtig */
            background: rgba(255, 255, 255, 0.15); 
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 12px;
            border-radius: 8px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            z-index: 999999; /* Altijd bovenop het game canvas */
            cursor: pointer;
            backdrop-filter: blur(4px); /* Glas-effect */
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        /* Iets duidelijker bij hover/klik */
        .pwa-back-button:hover, .pwa-back-button:active {
            background: rgba(37, 99, 235, 0.5);
            color: white;
            transform: scale(1.05);
        }
        }

        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; }
    </style>

    <script type="text/javascript" src="Jump_Gamemonetize.js"></script>
    <script src="/js/main.js"></script>
  </head>

  <body id="body">
    
    <a href="/index.html" class="pwa-back-button">
        <span style="font-size: 14px;">←</span> 
        <span>Home</span>
    </a>

    <div id="modal_parent">
      <div id="modal_content">
        <span id="modal_close_button">&times;</span>
        <div id="store_link_modal_content" class="modal_inner"></div>
        <div id="share_file_modal_content" class="modal_inner"></div>
      </div>
    </div>

    <div id="canvas_border" class="emscripten_border">
      <div id="play_content" class="middle center">
        <div class="edge">
          <div class="box">
            <div class="black">
              <img src="webapp/cover.jpg" class="cover" />
              <p class="title">Drive Mad</p>
              <p class="author">Martin Magni</p>
            </div>
          </div>
        </div>
        <div id="progress_or_play">
            <progress id="progress" class="loading" value="0" max="100"></progress>
        </div>
      </div>

      <canvas class="emscripten" id="canvas" tabindex="-1"></canvas>
      <div id="gradient"></div>
      <div id="webview_content"></div>
    </div>

    <script type="text/javascript" src="webapp/source_min.js"></script>
    <script type="text/javascript" src="webapp/index.js"></script>
  </body>
</html>
